
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content=
          "width=device-width,
          initial-scale=1.0">

    <title>
        Smart Sudoku Solver
    </title>

    <link rel="stylesheet"
          href=
          "{{ url_for(
          'static',
          filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>
        Smart Sudoku Solver
    </h1>

    <!-- Dashboard -->
    <div class="dashboard">

        <div class="info-card">
            <h3>⏱ Timer</h3>
            <span id="timer">
                00:00
            </span>
        </div>

        <div class="info-card">
            <h3>❤️ Lives</h3>
            <span id="lives">
                3
            </span>
        </div>

        <div class="info-card">
            <h3>🏆 Score</h3>
            <span id="score">
                0
            </span>
        </div>

        <div class="info-card">
            <h3>🎮 Status</h3>
            <span id="status">
                Playing
            </span>
        </div>

    </div>

    <!-- Difficulty -->
    <div class="difficulty">

        <button onclick=
        "loadPuzzle('easy')">
            Easy
        </button>

        <button onclick=
        "loadPuzzle('medium')">
            Medium
        </button>

        <button onclick=
        "loadPuzzle('hard')">
            Hard
        </button>

    </div>

    <!-- Sudoku Grid -->
    <div id="grid"></div>

    <!-- Controls -->
    <div class="controls">

        <button onclick=
        "solveSudoku()">
            🧠 Solve
        </button>

        <button onclick=
        "resetGrid()">
            🔄 Reset
        </button>

        <button onclick=
        "randomPuzzle()">
            🎲 Random
        </button>

        <button onclick=
        "pauseTimer()">
            ⏸ Pause
        </button>

        <button id="themeBtn"
                onclick=
        "toggleTheme()">
            🌙 Dark Mode
        </button>

    </div>

</div>

<script src=
"{{ url_for(
'static',
filename='script.js'
) }}">
</script>

</body>
</html>
